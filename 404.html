<!doctype html>
<html>
  <head>
    <script>
      // Redirect all 404s to the root, preserving the path as a query parameter.
      // The app can parse this on load if deep-linking is ever needed.
      var pathSegmentsToKeep = 1; // '/crazy-checkers/' = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' +
        '?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
